name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            # MySQL 8 — matches the production Cloud deployment
            # (`db:show` reports MySQL 8.0.39). The CRM was originally
            # architected for Postgres (partial unique indexes,
            # advisory locks, JSONB+GIN), but the project moved to
            # MySQL on 2026-05-09; migrations are MySQL-safe and
            # HoldService advisory locks dispatch per driver.
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: crm_test
                    MYSQL_USER: crm
                    MYSQL_PASSWORD: crm
                ports: ['3306:3306']
                options: >-
                    --health-cmd "mysqladmin ping -h 127.0.0.1 -ucrm -pcrm --silent"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 20

            redis:
                image: redis:7-alpine
                ports: ['6379:6379']
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP 8.3
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: pdo_mysql, redis, mbstring, intl, bcmath
                  coverage: none
                  tools: composer:v2

            - name: Cache composer
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-

            - name: composer install
              run: composer install --prefer-dist --no-progress --no-interaction
              env:
                  COMPOSER_PROCESS_TIMEOUT: 0

            - name: Copy .env
              run: |
                  cp .env.example .env
                  php artisan key:generate

            - name: Run migrations against test DB
              run: php artisan migrate --force --database=mysql
              env:
                  DB_CONNECTION: mysql
                  DB_HOST: 127.0.0.1
                  DB_PORT: 3306
                  DB_DATABASE: crm_test
                  DB_USERNAME: crm
                  DB_PASSWORD: crm

            - name: Pint (code style)
              run: vendor/bin/pint --test

            - name: Pest (unit + feature)
              run: vendor/bin/pest --parallel
              env:
                  DB_CONNECTION: mysql
                  DB_HOST: 127.0.0.1
                  DB_PORT: 3306
                  DB_DATABASE: crm_test
                  DB_USERNAME: crm
                  DB_PASSWORD: crm
                  REDIS_HOST: 127.0.0.1
                  REDIS_CLIENT: predis

    frontend:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - run: npm ci
            - run: npm run build
