name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: crm_test
                    POSTGRES_USER: crm
                    POSTGRES_PASSWORD: crm
                ports: ['5432:5432']
                options: >-
                    --health-cmd "pg_isready -U crm"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10

            redis:
                image: redis:7-alpine
                ports: ['6379:6379']
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10

        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP 8.3
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: pdo_pgsql, redis, mbstring, intl, bcmath
                  coverage: none
                  tools: composer:v2

            - name: Cache composer
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-

            - name: composer install
              run: composer install --prefer-dist --no-progress --no-interaction
              env:
                  COMPOSER_PROCESS_TIMEOUT: 0

            - name: Copy .env
              run: |
                  cp .env.example .env
                  php artisan key:generate

            - name: Run migrations against test DB
              run: php artisan migrate --force --database=pgsql
              env:
                  DB_CONNECTION: pgsql
                  DB_HOST: 127.0.0.1
                  DB_DATABASE: crm_test
                  DB_USERNAME: crm
                  DB_PASSWORD: crm

            - name: Pint (code style)
              run: vendor/bin/pint --test

            - name: Pest (unit + feature)
              run: vendor/bin/pest --parallel
              env:
                  DB_CONNECTION: pgsql
                  DB_HOST: 127.0.0.1
                  DB_DATABASE: crm_test
                  DB_USERNAME: crm
                  DB_PASSWORD: crm
                  REDIS_HOST: 127.0.0.1
                  REDIS_CLIENT: predis

    frontend:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - run: npm ci
            - run: npm run build
